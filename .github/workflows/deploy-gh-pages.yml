name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter web app
        run: flutter build web --target=lib/main.dart --release --base-href="/" --pwa-strategy=none

      - name: Copy CNAME to build output
        run: cp web/CNAME build/web/CNAME

      - name: Copy staticwebapp.config.json for SPA routing
        run: |
          if [ -f staticwebapp.config.json ]; then
            cp staticwebapp.config.json build/web/staticwebapp.config.json
          fi

      - name: Create 404.html for GitHub Pages SPA routing
        run: cp build/web/index.html build/web/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
