<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ndu Project">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Ndu Project">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Ndu Project</title>
  <link rel="manifest" href="manifest.json">

  <!-- Firebase SDK Configuration managed by FlutterFire -->
  <script>
    window.flutterfire_web_sdk_version = '12.7.0';
  </script>
  <style>
    /* System font fallback to avoid Google Fonts CDN dependency */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
    }
  </style>
  <script>
    // Flutter web uses hash routes in local/dev builds. Normalize accidental
    // mixed URLs such as /contracts-tracking#/dashboard to /#/contracts-tracking
    // so deep links open the intended workspace instead of reflecting dashboard.
    (function normalizeFlutterHashRoute() {
      var path = window.location.pathname.replace(/\/+$/, '');
      var hash = window.location.hash || '';
      if (!path || path === '/') return;
      if (path.indexOf('.') !== -1) return;
      if (hash && hash !== '#/' && hash !== '#/dashboard') return;
      window.history.replaceState(null, '', '/#' + path);
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
